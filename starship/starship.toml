command_timeout = 1000

# Only modules named here are evaluated — no need to disable the rest.
format = """
$username\
$hostname\
$directory\
${custom.conductor}\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$jobs\
$sudo\
$character"""

[username]
format = "[$user]($style) "
style_user = "bright-black"
style_root = "red"
show_always = false  # Only show when SSH or root

[hostname]
format = "[@$hostname]($style) "
style = "bright-black"
ssh_only = true

[directory]
read_only = " "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[character]
success_symbol = "[›](bright-black)"
error_symbol = "[›](red)"

[git_branch]
format = "[$branch]($style) "
style = "bright-black"

[git_status]
use_git_executable = true
format = "[$ahead_behind]($style) [($conflicted)($staged)($modified)($untracked)](bright-black)"
style = "cyan"
conflicted = "[!${count}](red) "
untracked = "[?${count}](bright-black) "
modified = "[~${count}](yellow) "
staged = "[+${count}](green) "
renamed = ""
deleted = ""
stashed = ""
ahead = "↑${count}"
behind = " ↓${count}"
diverged = "↑${ahead_count} ↓${behind_count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
min_time = 2_000  # Only show if command took >2s
format = "[$duration]($style) "
style = "yellow"

[sudo]
format = "[sudo]($style) "
style = "red"
disabled = false

[jobs]
format = "[$symbol$number]($style) "
style = "bright-black"
symbol = "✦ "
number_threshold = 1

# Conductor (conductor.build) — see agents/skills/conductor/SKILL.md
[custom.conductor]
description = "Conductor workspace"
when = 'test -n "${CONDUCTOR_WORKSPACE_NAME:-}"'
command = 'printf %s "$CONDUCTOR_WORKSPACE_NAME"'
format = "[$output]($style) "
style = "bright-black"
