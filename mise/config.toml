[settings]
pin = true
# trusted_config_paths is set via MISE_TRUSTED_CONFIG_PATHS in zsh/.zshenv, not here:
# mise resolves this symlinked global config to its dotfiles path, treats it as
# non-global, and ignores the setting for security reasons.

[tools]
node = "24"
pnpm = "10"
# pm2 via the npm backend so it lives in a node-version-independent prefix —
# a node upgrade can't prune the install out from under the running daemon.
"npm:pm2" = "7"
